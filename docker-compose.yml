services:
  monitor-mqtt:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitor-mqtt
    restart: unless-stopped
    runtime: nvidia
    environment:
      MQTT_USER: ${MQTT_USER}
      MQTT_PASS: ${MQTT_PASS}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LLAMA_API_URL: ${LLAMA_API_URL:-http://host.docker.internal:8020}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - ai-server_default

networks:
  ai-server_default:
    external: true